<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#6C4FA3" />
<title>Wedding Planner — Budget & Tabungan</title>

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#2A2140;
    --purple:#6C4FA3;
    --purple-2:#8B6DB6;
    --purple-soft:#A98FCC;
    --lilac:#CBB8E6;
    --lilac-soft:#E7DBF4;
    --bg:#F4F0FA;
    --bg-2:#EFE8F8;
    --card:#FFFFFF;
    --muted:#8A7CA8;
    --line:#EBE2F5;
    --line-strong:#DDD0EE;
    --emerald:#3FAE86;
    --emerald-soft:#E3F5EE;
    --amber:#D6A24E;
    --rose:#C77BA0;
    --danger:#D9536B;
    --shadow:0 8px 24px rgba(70,45,120,.10);
    --shadow-sm:0 3px 10px rgba(70,45,120,.08);
    --r:18px;
    --r-sm:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 500px at 15% -10%, #FBEFF6 0%, transparent 55%),
      radial-gradient(900px 600px at 110% 0%, #E9E0F7 0%, transparent 55%),
      var(--bg);
    background-attachment:fixed;
    line-height:1.5;
    padding-bottom:96px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .serif{font-family:'Playfair Display',serif}

  /* ---------- Header ---------- */
  header{
    padding:calc(env(safe-area-inset-top) + 20px) 20px 16px;
    text-align:center;
    position:relative;
  }
  .eyebrow{
    font-size:11px;letter-spacing:2.5px;font-weight:600;text-transform:uppercase;
    color:var(--purple);opacity:.85;
  }
  .brand{
    font-family:'Playfair Display',serif;font-weight:800;
    font-size:34px;line-height:1.05;color:var(--ink);margin-top:4px;letter-spacing:.5px;
  }
  .brand .em{color:var(--purple);font-style:italic}
  .emblem{
    width:48px;height:48px;border-radius:50%;margin:0 auto 12px;
    background:linear-gradient(135deg,var(--purple),var(--purple-soft));
    color:#fff;display:grid;place-items:center;font-size:21px;
    box-shadow:0 6px 16px rgba(108,79,163,.32);
  }

  main{max-width:560px;margin:0 auto;padding:0 16px}
  .view{display:none;animation:fade .35s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- Section titles ---------- */
  .sec-title{
    font-family:'Playfair Display',serif;font-weight:700;font-size:19px;
    color:var(--ink);margin:22px 4px 12px;display:flex;align-items:center;gap:8px;
  }
  .sec-title small{font-family:'Inter';font-size:12px;font-weight:500;color:var(--muted)}

  /* ---------- Cards ---------- */
  .card{
    background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
    padding:18px;border:1px solid var(--line);
  }
  .card + .card{margin-top:14px}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .kpi{
    background:var(--card);border-radius:var(--r-sm);padding:14px 12px;
    box-shadow:var(--shadow-sm);border:1px solid var(--line);text-align:left;
  }
  .kpi .lbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .kpi .val{font-weight:700;font-size:16px;margin-top:6px;color:var(--ink);word-break:break-word}
  .kpi.total .val{color:var(--purple)}
  .kpi.actual .val{color:var(--rose)}
  .kpi.sisa .val{color:var(--emerald)}

  /* Donut */
  .donut-wrap{position:relative;width:200px;height:200px;margin:6px auto 2px}
  .donut-center{
    position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none;
  }
  .donut-center .pct{font-family:'Playfair Display',serif;font-weight:800;font-size:34px;color:var(--purple);line-height:1}
  .donut-center .cap{font-size:11px;color:var(--muted);font-weight:500;margin-top:3px;letter-spacing:.5px}
  .legend{display:flex;justify-content:center;gap:18px;margin-top:10px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}

  /* Table */
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl thead th{
    background:var(--purple);color:#fff;font-weight:600;font-size:11px;
    letter-spacing:.4px;text-transform:uppercase;padding:10px 8px;text-align:right;
  }
  .tbl thead th:first-child{text-align:left;border-radius:10px 0 0 10px}
  .tbl thead th:last-child{border-radius:0 10px 10px 0}
  .tbl tbody td{padding:11px 8px;border-bottom:1px solid var(--line);text-align:right;color:var(--ink)}
  .tbl tbody td:first-child{text-align:left;font-weight:500}
  .tbl tbody tr:active{background:var(--bg-2)}
  .tbl .cat-ico{display:inline-flex;width:22px;height:22px;border-radius:7px;align-items:center;justify-content:center;font-size:12px;margin-right:8px;vertical-align:-5px}
  .pct-pill{display:inline-block;min-width:42px;padding:2px 8px;border-radius:20px;font-weight:600;font-size:12px;background:var(--lilac-soft);color:var(--purple)}
  .pct-pill.warn{background:#FCEEDD;color:var(--amber)}
  .pct-pill.over{background:#FBE3E7;color:var(--danger)}
  .tbl tfoot td{padding:12px 8px;font-weight:700;background:var(--bg-2);color:var(--ink)}
  .tbl tfoot td:first-child{border-radius:10px 0 0 10px}
  .tbl tfoot td:last-child{border-radius:0 10px 10px 0}
  .num{font-variant-numeric:tabular-nums}

  .row-add{margin-top:12px;width:100%;padding:12px;border-radius:var(--r-sm);
    border:1.5px dashed var(--line-strong);color:var(--purple);font-weight:600;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:8px;background:#fff}
  .row-add:active{background:var(--bg-2)}
  .share-btn{margin-top:10px;width:100%;padding:13px;border-radius:var(--r-sm);border:none;
    background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff;font-weight:700;
    font-size:14px;font-family:inherit;box-shadow:0 6px 16px rgba(108,79,163,.3);cursor:pointer}
  .share-btn:active{transform:scale(.99);opacity:.95}
  .share-preview{width:100%;border-radius:14px;box-shadow:var(--shadow);margin-top:6px;display:block}
  .share-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}

  /* Savings pots */
  .pot{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);padding:16px 16px 18px;margin-top:14px}
  .pot-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .pot-name{font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .pot-ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none}
  .pot-note{font-size:12px;color:var(--muted);margin-top:2px}
  .pot-edit{color:var(--muted);font-size:18px;padding:2px 6px;flex:none}
  .pot-amt{margin-top:12px;display:flex;justify-content:space-between;align-items:flex-end}
  .pot-amt .big{font-weight:700;font-size:18px;color:var(--purple)}
  .pot-amt .tgt{font-size:12px;color:var(--muted)}
  .pot-body{display:flex;align-items:center;gap:16px;margin-top:14px}
  .pot-donut{flex:none}
  .pot-notarget{width:78px;height:78px;flex:none;display:grid;place-items:center;text-align:center;
    font-size:11px;line-height:1.25;font-weight:600;color:var(--muted);
    border:2px dashed var(--line-strong);border-radius:50%}
  .pot-side{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
  .ps-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:13px}
  .ps-row span{color:var(--muted);flex:none}
  .ps-row b{font-weight:700;font-size:14px;color:var(--ink);text-align:right}
  .bar{height:12px;border-radius:20px;background:var(--bg-2);margin-top:10px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--purple),var(--purple-soft));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .pot-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px}
  .pot-pct{font-weight:700;font-size:13px;color:var(--purple)}
  .pot-actions{display:flex;gap:8px}
  .mini-btn{font-size:12px;font-weight:600;padding:8px 12px;border-radius:20px;background:var(--bg-2);color:var(--purple)}
  .mini-btn.primary{background:var(--purple);color:#fff}
  .mini-btn:active{transform:scale(.97)}

  .overall-mini{display:flex;gap:14px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .stat{text-align:center}
  .stat .n{font-weight:700;font-size:15px;color:var(--ink)}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .empty{text-align:center;color:var(--muted);padding:26px 16px;font-size:13px}
  .empty .ico{font-size:34px;display:block;margin-bottom:8px;opacity:.6}

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,255,255,.9);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:8px 12px calc(env(safe-area-inset-bottom) + 8px);
  }
  nav.bottom button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);font-size:11px;font-weight:600;padding:6px 0;border-radius:12px;
  }
  nav.bottom button .ni{font-size:20px;line-height:1}
  nav.bottom button.active{color:var(--purple)}
  nav.bottom button.active .ni{transform:translateY(-1px)}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 78px);z-index:41;
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple),var(--purple-2));
    color:#fff;font-size:26px;display:grid;place-items:center;
    box-shadow:0 10px 24px rgba(108,79,163,.4);
  }
  .fab:active{transform:scale(.94)}

  /* ---------- Modal ---------- */
  .sheet-bg{position:fixed;inset:0;background:rgba(42,33,64,.45);backdrop-filter:blur(2px);z-index:60;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .sheet-bg.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;
    background:var(--card);border-radius:24px 24px 0 0;
    padding:8px 20px calc(env(safe-area-inset-bottom) + 22px);
    max-width:560px;margin:0 auto;max-height:88vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.85,.25,1);
    box-shadow:0 -10px 40px rgba(70,45,120,.2);
  }
  .sheet.show{transform:translateY(0)}
  .grab{width:40px;height:4px;border-radius:4px;background:var(--line-strong);margin:8px auto 14px}
  .sheet h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px}
  .sheet .sub{font-size:12px;color:var(--muted);margin-bottom:16px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input, .field select, .field textarea{
    width:100%;padding:13px 14px;border:1.5px solid var(--line-strong);border-radius:var(--r-sm);
    font-size:15px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .2s;
  }
  .field input:focus, .field textarea:focus{border-color:var(--purple)}
  .field .prefix{position:relative}
  .field .prefix span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:600;pointer-events:none}
  .field .prefix input{padding-left:38px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .chip{padding:8px 14px;border-radius:20px;background:var(--bg-2);font-size:13px;font-weight:600;color:var(--muted);border:1.5px solid transparent}
  .chip.active{background:var(--lilac-soft);color:var(--purple);border-color:var(--lilac)}
  .btn{width:100%;padding:15px;border-radius:var(--r-sm);font-weight:700;font-size:15px;background:var(--purple);color:#fff;margin-top:6px}
  .btn:active{transform:scale(.99);opacity:.95}
  .btn.ghost{background:var(--bg-2);color:var(--purple)}
  .btn.danger-ghost{background:#FBE3E7;color:var(--danger)}
  .btn-row{display:flex;gap:10px}
  .btn-row .btn{margin-top:0}

  /* history list */
  .hist{margin-top:4px}
  .hist-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .hist-item:last-child{border-bottom:none}
  .hist-l .a{font-weight:600;font-size:14px}
  .hist-l .m{font-size:11px;color:var(--muted);margin-top:2px}
  .hist-by{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px;background:var(--lilac-soft);color:var(--purple);margin-left:6px}
  .hist-del{color:var(--danger);font-size:13px;font-weight:600;padding:6px 8px}

  /* settings menu */
  .menu-item{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid var(--line);font-size:15px;font-weight:500}
  .menu-item .mi{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:var(--bg-2);flex:none}
  .menu-item:last-child{border-bottom:none}
  .menu-item small{display:block;font-size:11px;color:var(--muted);font-weight:400}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 150px);transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:500;
    z-index:80;opacity:0;pointer-events:none;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.25);white-space:nowrap
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(min-width:600px){ .brand{font-size:40px} }

  /* ---------- Gate: login & household ---------- */
  .gate{position:fixed;inset:0;z-index:200;display:none;place-items:center;padding:20px;
    background:radial-gradient(800px 500px at 20% 0%, #F3E8FA 0%, #EDE3F8 45%, #E6DBF4 100%)}
  .gate.show{display:grid}
  .gate-card{background:#fff;border-radius:26px;box-shadow:0 20px 50px rgba(70,45,120,.22);
    padding:30px 24px;max-width:400px;width:100%;text-align:center;border:1px solid var(--line)}
  .gate-emblem{width:60px;height:60px;border-radius:50%;margin:0 auto 16px;
    background:linear-gradient(135deg,var(--purple),var(--purple-soft));color:#fff;
    display:grid;place-items:center;font-size:26px;box-shadow:0 8px 20px rgba(108,79,163,.35)}
  .gate h2{font-family:'Playfair Display',serif;font-size:25px;margin-bottom:6px}
  .gate p{font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.5}
  .gate-loading{color:var(--muted);font-size:14px;padding:20px}
  .g-btn{width:100%;padding:14px;border-radius:14px;font-weight:700;font-size:15px;
    font-family:inherit;border:none;cursor:pointer;margin-top:10px;
    display:flex;align-items:center;justify-content:center;gap:10px}
  .g-btn.google{background:#fff;color:#3c4043;border:1.5px solid var(--line-strong);box-shadow:var(--shadow-sm)}
  .g-btn.primary{background:var(--purple);color:#fff}
  .g-btn.ghost{background:var(--bg-2);color:var(--purple)}
  .g-btn:active{transform:scale(.99)}
  .gate input{width:100%;padding:13px 14px;border:1.5px solid var(--line-strong);border-radius:12px;
    font-size:15px;font-family:inherit;text-align:center;outline:none;margin-top:8px}
  .gate input:focus{border-color:var(--purple)}
  .gate input.code{text-transform:uppercase;letter-spacing:5px;font-weight:700;font-size:22px}
  .gate .divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--muted);font-size:12px}
  .gate .divider::before,.gate .divider::after{content:'';flex:1;height:1px;background:var(--line)}
  .gate .err{color:var(--danger);font-size:12px;margin-top:10px;min-height:16px}
  .gate .who{font-size:12px;color:var(--muted);margin-top:16px}
  .gate .who a{color:var(--purple);cursor:pointer;text-decoration:underline}

  /* kode undangan */
  .invite-code{font-size:30px;font-weight:800;letter-spacing:7px;color:var(--purple);
    background:var(--bg-2);border-radius:14px;padding:16px;margin:12px 0;font-family:'Inter'}

  /* ---------- Privasi ---------- */
  .privacy-box{background:var(--bg-2);border-radius:14px;padding:4px 14px;margin-bottom:14px}
  .pv-title{font-size:12px;font-weight:700;color:var(--purple);padding:11px 0 4px}
  .pv-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px 0;border-top:1px solid var(--line);cursor:pointer}
  .pv-row b{font-size:13px;display:block}
  .pv-row small{font-size:11px;color:var(--muted);display:block;margin-top:2px;line-height:1.35}
  .pv-row input[type=checkbox]{width:44px;height:26px;flex:none;appearance:none;background:var(--line-strong);
    border-radius:20px;position:relative;cursor:pointer;transition:.2s}
  .pv-row input[type=checkbox]::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
    border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .pv-row input[type=checkbox]:checked{background:var(--purple)}
  .pv-row input[type=checkbox]:checked::after{transform:translateX(18px)}
  .pv-badge{font-size:9px;font-weight:700;background:var(--lilac-soft);color:var(--purple);
    padding:2px 7px;border-radius:8px;margin-left:6px;vertical-align:2px;white-space:nowrap}

  /* pos yang angkanya disembunyikan */
  .pot-hidden{display:flex;align-items:center;gap:14px;margin-top:14px;padding:16px;
    background:var(--bg-2);border-radius:14px;color:var(--muted)}
  .pot-hidden .ph-ico{font-size:26px}
  .pot-hidden div{font-size:13px;font-weight:600;color:var(--ink)}
  .pot-hidden small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:2px}
  .hist-lock{font-size:14px;padding:6px 8px;opacity:.5}

  /* ---------- Status sync ---------- */
  .sync-bar{position:fixed;top:0;left:0;right:0;z-index:150;text-align:center;
    font-size:11px;font-weight:600;padding:6px;color:#fff;display:none}
  .sync-bar.show{display:block}
  .sync-bar.offline{background:var(--amber)}
  .sync-bar.pending{background:var(--purple)}
</style>
</head>
<body>

<!-- ===== Overlay: Login / Household ===== -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-emblem">♥</div>
    <div id="gate-body">
      <div class="gate-loading">Memuat…</div>
    </div>
  </div>
</div>

<header>
  <div class="emblem">♥</div>
  <div class="eyebrow">Wedding Planner Digital</div>
  <h1 class="brand">Our <span class="em">Wedding</span> Fund</h1>
</header>

<main>
  <!-- ========== BUDGET VIEW ========== -->
  <section id="view-budget" class="view active">
    <div class="kpi-grid">
      <div class="kpi total"><div class="lbl">Total Budget</div><div class="val" id="k-budget">Rp0</div></div>
      <div class="kpi actual"><div class="lbl">Terpakai</div><div class="val" id="k-actual">Rp0</div></div>
      <div class="kpi sisa"><div class="lbl">Sisa</div><div class="val" id="k-sisa">Rp0</div></div>
    </div>

    <div class="sec-title serif">Budget Progress</div>
    <div class="card">
      <div class="donut-wrap">
        <canvas id="donut-budget"></canvas>
        <div class="donut-center">
          <div>
            <div class="pct" id="donut-pct">0%</div>
            <div class="cap">Terpakai</div>
          </div>
        </div>
      </div>
      <div class="legend">
        <span><i class="dot" style="background:var(--purple)"></i>Terpakai</span>
        <span><i class="dot" style="background:var(--lilac)"></i>Sisa</span>
      </div>
    </div>

    <div class="sec-title serif">Rincian Pengeluaran <small>ketuk baris untuk edit</small></div>
    <div class="card" style="padding:14px 12px">

        <div class="stat"><div class="n" id="sav-target">Rp0</div><div class="l">Target</div></div>

<!-- FAB (setoran cepat, hanya di view tabungan) -->
<button class="fab" id="fab" onclick="quickDeposit()">＋</button>

<!-- Bottom nav -->
<nav class="bottom">
  <button data-view="budget" class="active" onclick="switchView('budget')"><span class="ni">📊</span>Budget</button>
  <button data-view="saving" onclick="switchView('saving')"><span class="ni">🎯</span>Tabungan</button>
  <button onclick="openSettings()"><span class="ni">⚙️</span>Menu</button>
</nav>

<!-- Modal system -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetContent"></div></div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./db.js"></script>
<script>
/* =========================================================
   DATA — sekarang bersumber dari Supabase (lewat db.js),
   dengan localStorage sebagai cache offline.
   `DB` di bawah ini menunjuk ke WF.DB, sehingga SELURUH kode
   render (chart, donut, kartu) di bawah tidak perlu diubah.
========================================================= */
const APP_VERSION='2.0.2';

const ICONS=['💒','🍽️','👗','💐','📸','🎉','🎁','📦','💍','🚗','💌','🕌'];
const POT_ICONS=['💍','🏠','🎉','💐','✈️','💰'];

let DB = (window.WF && window.WF.DB) || {categories:[],pots:[],user:null,household:null,online:true,pendingCount:0};

/* Fungsi kompatibilitas: dulu menyimpan ke localStorage.
   Sekarang penyimpanan diurus db.js, jadi ini tidak melakukan apa-apa. */
function save(){}

/* Penjaga: banyak aksi butuh login + rumah tangga. Kalau belum siap,
   beri tahu dengan jelas alih-alih error diam-diam. */
function requireReady(){
  if(!window.WF){ toast('Aplikasi belum siap dimuat'); return false; }
  if(!DB.user){ toast('Masuk dulu ya'); gateLogin(); return false; }
  if(!DB.household){ toast('Buat rumah tangga dulu'); gateHousehold(); return false; }
  return true;
}

/* =========================================================
   HELPERS
========================================================= */
const rp=n=>'Rp'+(Math.round(n||0)).toLocaleString('id-ID');
const rpShort=n=>{n=Math.round(n||0);
  if(n>=1e9)return 'Rp'+(n/1e9).toFixed(n%1e9?1:0)+'M';
  if(n>=1e6)return 'Rp'+(n/1e6).toFixed(n%1e6?1:0)+'jt';
  return 'Rp'+n.toLocaleString('id-ID');};
const num=n=>(Math.round(n||0)).toLocaleString('id-ID');
const pctOf=(a,b)=>b>0?(a/b*100):0;
const fmtDate=d=>new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);}

// parse "1.500.000" -> 1500000
const parseNum=s=>parseInt(String(s).replace(/\D/g,''),10)||0;
// format an input as user types with thousand separators
function attachThousand(input){
  input.addEventListener('input',()=>{
    const v=parseNum(input.value);
    input.value=v?v.toLocaleString('id-ID'):'';
  });
}

/* =========================================================
   CHARTS
========================================================= */
let budgetChart,savingChart;
const donutOpts=(colors)=>({
  type:'doughnut',
  data:{datasets:[{data:[0,1],backgroundColor:colors,borderWidth:0,borderRadius:6,spacing:2}]},
  options:{cutout:'74%',responsive:true,maintainAspectRatio:true,
    plugins:{legend:{display:false},tooltip:{enabled:false}},
    animation:{animateRotate:true,duration:700}}
});
function initCharts(){
  budgetChart=new Chart(document.getElementById('donut-budget'),donutOpts(['#6C4FA3','#E7DBF4']));
  savingChart=new Chart(document.getElementById('donut-saving'),donutOpts(['#3FAE86','#E3F5EE']));
}

/* =========================================================
   RENDER — BUDGET
========================================================= */
function renderBudget(){
  const cats=DB.categories;
  let tPlan=0,tActual=0;
  const body=document.getElementById('cat-body');
  body.innerHTML='';
  cats.forEach(c=>{
    tPlan+=c.plan;tActual+=c.actual;
    const p=pctOf(c.actual,c.plan);
    const cls=p>100?'over':p>=90?'warn':'';
    const tr=document.createElement('tr');
    tr.onclick=()=>openCat(c.id);
    tr.innerHTML=`
      <td><span class="cat-ico" style="background:var(--lilac-soft)">${c.ico||'📦'}</span>${escapeHtml(c.name)}</td>
      <td class="num">${num(c.plan)}</td>
      <td class="num">${num(c.actual)}</td>
      <td><span class="pct-pill ${cls}">${c.plan?Math.round(p)+'%':'–'}</span></td>`;
    body.appendChild(tr);
  });
  const sisa=tPlan-tActual;
  const prog=pctOf(tActual,tPlan);

  document.getElementById('k-budget').textContent=rp(tPlan);
  document.getElementById('k-actual').textContent=rp(tActual);
  document.getElementById('k-sisa').textContent=rp(sisa);
  document.getElementById('t-plan').textContent=num(tPlan);
  document.getElementById('t-actual').textContent=num(tActual);
  document.getElementById('t-pct').textContent=Math.round(prog)+'%';
  document.getElementById('donut-pct').textContent=Math.round(prog)+'%';

  budgetChart.data.datasets[0].data=[tActual, Math.max(sisa,0)|| (tActual?0:1)];
  budgetChart.update();
}

/* =========================================================
   RENDER — SAVINGS
========================================================= */
const POT_COLORS=['#8B6DB6','#A98FCC','#C88BB0','#9488D0','#8FB0D6','#B57FC9'];
function svgDonut(pct,color){
  const r=42,C=2*Math.PI*r,off=C*(1-Math.min(pct,100)/100);
  return `<svg class="pot-donut" viewBox="0 0 100 100" width="78" height="78">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--bg-2)" stroke-width="13"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="13" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)"/>
    <text x="50" y="55" text-anchor="middle" font-size="23" font-weight="800" fill="${color}" font-family="Inter,sans-serif">${Math.round(pct)}%</text>
  </svg>`;
}

function renderSaving(){
  const pots=DB.pots;
  let tTarget=0,tColl=0;
  const list=document.getElementById('pot-list');
  list.innerHTML='';
  if(!pots.length){
    list.innerHTML=`<div class="card empty"><span class="ico">🎯</span>Belum ada pos tabungan.<br>Buat pos pertamamu untuk mulai menabung.</div>`;
  }
  pots.forEach((p,idx)=>{
    // Pos yang angkanya disembunyikan (dilihat oleh pasangan) -> collected/target = null
    const hidden = p.can_view_amount === false;
    const coll = hidden ? 0 : (p.deposits||[]).reduce((s,d)=>s+d.amount,0);
    const target = hidden ? 0 : (p.target||0);
    if(!hidden){ tTarget+=target; tColl+=coll; }
    const prog=Math.min(pctOf(coll,target),100);
    const color=POT_COLORS[idx % POT_COLORS.length];
    const mine = !p.owner_id || p.owner_id===DB.user?.id;
    const el=document.createElement('div');
    el.className='pot';
    el.innerHTML=`
      <div class="pot-head">
        <div>
          <div class="pot-name"><span class="pot-ico" style="background:${color}22">${p.ico||'💰'}</span>${escapeHtml(p.name)}
            ${p.is_private?'<span class="pv-badge">🔒 Pribadi</span>':''}
            ${(!p.is_private && p.show_amount===false && mine)?'<span class="pv-badge">🙈 Angka disembunyikan</span>':''}
          </div>
          ${p.note?`<div class="pot-note">${escapeHtml(p.note)}</div>`:''}
        </div>
        ${mine?`<button class="pot-edit" onclick="openPot('${p.id}')">✎</button>`:''}
      </div>
      ${hidden ? `
      <div class="pot-hidden">
        <span class="ph-ico">🙈</span>
        <div>Nominal disembunyikan<small>Pasanganmu belum membagikan angka pos ini</small></div>
      </div>` : `
      <div class="pot-body">
        ${target>0 ? svgDonut(prog,color) : `<div class="pot-notarget">Belum<br>ada<br>target</div>`}
        <div class="pot-side">
          <div class="ps-row"><span>Terkumpul</span><b style="color:${color}">${rp(coll)}</b></div>
          ${target>0?`
          <div class="ps-row"><span>Target</span><b>${rp(target)}</b></div>
          <div class="ps-row"><span>Kurang</span><b style="color:var(--purple)">${coll>=target?'Tercapai ✓':rp(target-coll)}</b></div>`:''}
        </div>
      </div>
      <div class="bar"><i style="width:${target?prog:0}%;background:linear-gradient(90deg,${color},${color}AA)"></i></div>
      <div class="pot-foot">
        <div class="pot-actions" style="margin-left:auto">
          <button class="mini-btn" onclick="openHistory('${p.id}')">Riwayat</button>
          <button class="mini-btn primary" style="background:${color}" onclick="openDeposit('${p.id}')">＋ Setor</button>
        </div>
      </div>`}`;
    list.appendChild(el);
  });
  const left=Math.max(tTarget-tColl,0);
  const prog=pctOf(tColl,tTarget);
  document.getElementById('sav-collected').textContent=rpShort(tColl);
  document.getElementById('sav-target').textContent=rpShort(tTarget);
  document.getElementById('sav-left').textContent=rpShort(left);
  document.getElementById('sav-pct').textContent=Math.round(prog)+'%';
  document.getElementById('pot-count').textContent=pots.length?`${pots.length} pos`:'';

  savingChart.data.datasets[0].data=[tColl, left || (tColl?0:1)];
  savingChart.update();
}

function renderAll(){renderBudget();renderSaving();save();}

/* =========================================================
   MODAL SYSTEM
========================================================= */
const sheet=document.getElementById('sheet');
const sheetBg=document.getElementById('sheetBg');
const sheetContent=document.getElementById('sheetContent');
function openSheet(html){sheetContent.innerHTML=html;sheetBg.classList.add('show');sheet.classList.add('show');}
function closeSheet(){sheetBg.classList.remove('show');sheet.classList.remove('show');}

/* ---- Kategori (Budget) ---- */
function openCat(catId){
  if(!requireReady())return;
  const c=catId?DB.categories.find(x=>x.id===catId):null;
  const isEdit=!!c;
  openSheet(`
    <h3>${isEdit?'Edit Kategori':'Kategori Baru'}</h3>
    <div class="sub">Anggaran (Plan) vs realisasi (Actual)</div>
    <div class="field">
      <label>Nama Kategori</label>
      <input id="f-name" value="${isEdit?escapeAttr(c.name):''}" placeholder="mis. Katering">
    </div>
    <div class="field">
      <label>Ikon</label>
      <div class="chips" id="ico-chips">${ICONS.map(i=>`<button type="button" class="chip ${isEdit&&c.ico===i?'active':''}" data-ico="${i}">${i}</button>`).join('')}</div>
    </div>
    <div class="field">
      <label>Plan (Anggaran)</label>
      <div class="prefix"><span>Rp</span><input id="f-plan" inputmode="numeric" value="${isEdit&&c.plan?c.plan.toLocaleString('id-ID'):''}" placeholder="0"></div>
    </div>
    <div class="field">
      <label>Actual (Sudah dibayar)</label>
      <div class="prefix"><span>Rp</span><input id="f-actual" inputmode="numeric" value="${isEdit&&c.actual?c.actual.toLocaleString('id-ID'):''}" placeholder="0"></div>
    </div>
    <button class="btn" onclick="saveCat('${catId||''}')">Simpan</button>
    ${isEdit?`<button class="btn danger-ghost" style="margin-top:10px" onclick="delCat('${c.id}')">Hapus Kategori</button>`:''}
  `);
  attachThousand(document.getElementById('f-plan'));
  attachThousand(document.getElementById('f-actual'));
  setupChips('ico-chips');
}
async function saveCat(catId){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Nama kategori wajib diisi');return;}
  const ico=activeChip('ico-chips')||'📦';
  const plan=parseNum(document.getElementById('f-plan').value);
  const actual=parseNum(document.getElementById('f-actual').value);
  try{
    if(catId) await WF.updateCategory(catId,{name,ico,plan,actual});
    else      await WF.addCategory({name,ico,plan,actual});
    renderAll();closeSheet();toast(catId?'Kategori diperbarui':'Kategori ditambahkan');
  }catch(e){ toast('Gagal: '+e.message); }
}
async function delCat(catId){
  if(!confirm('Hapus kategori ini?'))return;
  try{
    await WF.deleteCategory(catId);
    renderAll();closeSheet();toast('Kategori dihapus');
  }catch(e){ toast('Gagal: '+e.message); }
}

/* ---- Pos Tabungan ---- */
function openPot(potId){
  if(!requireReady())return;
  const p=potId?DB.pots.find(x=>x.id===potId):null;
  const isEdit=!!p;
  openSheet(`
    <h3>${isEdit?'Edit Pos':'Pos Tabungan Baru'}</h3>
    <div class="sub">Pisahkan dana biar tidak tercampur</div>
    <div class="field">
      <label>Nama Pos</label>
      <input id="p-name" value="${isEdit?escapeAttr(p.name):''}" placeholder="mis. Dana Mahar">
    </div>
    <div class="field">
      <label>Ikon</label>
      <div class="chips" id="pico-chips">${POT_ICONS.map(i=>`<button type="button" class="chip ${isEdit&&p.ico===i?'active':''}" data-ico="${i}">${i}</button>`).join('')}</div>
    </div>
    <div class="field">
      <label>Target Dana</label>
      <div class="prefix"><span>Rp</span><input id="p-target" inputmode="numeric" value="${isEdit&&p.target?p.target.toLocaleString('id-ID'):''}" placeholder="0"></div>
    </div>
    <div class="field">
      <label>Catatan <span style="font-weight:400">(opsional)</span></label>
      <input id="p-note" value="${isEdit?escapeAttr(p.note||''):''}" placeholder="mis. mahar + seserahan">
    </div>

    <div class="privacy-box">
      <div class="pv-title">🔒 Privasi Pos</div>
      <label class="pv-row">
        <div>
          <b>Pos Pribadi</b>
          <small>Pasangan tidak melihat pos ini sama sekali</small>
        </div>
        <input type="checkbox" id="p-private" ${isEdit&&p.is_private?'checked':''} onchange="syncPrivacyUI()">
      </label>
      <label class="pv-row" id="pv-show-row">
        <div>
          <b>Angka boleh dilihat pasangan</b>
          <small>Kalau dimatikan: pos tetap terlihat, tapi nominalnya disembunyikan</small>
        </div>
        <input type="checkbox" id="p-show" ${!isEdit||p.show_amount!==false?'checked':''}>
      </label>
    </div>

    <button class="btn" onclick="savePot('${potId||''}')">Simpan</button>
    ${isEdit?`<button class="btn danger-ghost" style="margin-top:10px" onclick="delPot('${p.id}')">Hapus Pos</button>`:''}
  `);
  attachThousand(document.getElementById('p-target'));
  setupChips('pico-chips');
  syncPrivacyUI();
}
/* Kalau pos ditandai PRIVAT, opsi "angka boleh dilihat" jadi tidak relevan
   (pasangan tidak melihat pos-nya sama sekali) -> disamarkan. */
function syncPrivacyUI(){
  const priv=document.getElementById('p-private');
  const row=document.getElementById('pv-show-row');
  if(!priv||!row)return;
  row.style.opacity = priv.checked ? .4 : 1;
  row.style.pointerEvents = priv.checked ? 'none' : 'auto';
}
async function savePot(potId){
  const name=document.getElementById('p-name').value.trim();
  if(!name){toast('Nama pos wajib diisi');return;}
  const ico=activeChip('pico-chips')||'💰';
  const target=parseNum(document.getElementById('p-target').value);
  const note=document.getElementById('p-note').value.trim();
  const is_private=document.getElementById('p-private').checked;
  const show_amount=document.getElementById('p-show').checked;
  try{
    if(potId) await WF.updatePot(potId,{name,ico,target,note,is_private,show_amount});
    else      await WF.addPot({name,ico,target,note,is_private,show_amount});
    renderAll();closeSheet();toast(potId?'Pos diperbarui':'Pos ditambahkan');
  }catch(e){ toast('Gagal: '+e.message); }
}
async function delPot(potId){
  if(!confirm('Hapus pos ini beserta seluruh riwayat setorannya?'))return;
  try{
    await WF.deletePot(potId);
    renderAll();closeSheet();toast('Pos dihapus');
  }catch(e){ toast('Gagal: '+e.message); }
}

/* ---- Setoran ---- */
let depBy='Saya';
function openDeposit(potId){
  if(!requireReady())return;
  const p=DB.pots.find(x=>x.id===potId);
  depBy='Saya';
  const today=new Date().toISOString().slice(0,10);
  openSheet(`
    <h3>Setor ke ${escapeHtml(p.name)}</h3>
    <div class="sub">Catat uang yang masuk</div>
    <div class="field">
      <label>Jumlah Setoran</label>
      <div class="prefix"><span>Rp</span><input id="d-amt" inputmode="numeric" placeholder="0" autofocus></div>
    </div>
    <div class="field">
      <label>Oleh</label>
      <div class="chips" id="by-chips">
        <button type="button" class="chip active" data-by="Saya">Saya</button>
        <button type="button" class="chip" data-by="Pasangan">Pasangan</button>
        <button type="button" class="chip" data-by="Bersama">Bersama</button>
      </div>
    </div>
    <div class="field">
      <label>Tanggal</label>
      <input id="d-date" type="date" value="${today}">
    </div>
    <div class="field">
      <label>Catatan <span style="font-weight:400">(opsional)</span></label>
      <input id="d-note" placeholder="mis. gaji bulan ini">
    </div>
    <button class="btn" onclick="saveDeposit('${potId}')">Simpan Setoran</button>
  `);
  attachThousand(document.getElementById('d-amt'));
  setupChips('by-chips',(v)=>depBy=v);
}
async function saveDeposit(potId){
  const amt=parseNum(document.getElementById('d-amt').value);
  if(amt<=0){toast('Isi jumlah setoran dulu');return;}
  const date=document.getElementById('d-date').value||new Date().toISOString().slice(0,10);
  const note=document.getElementById('d-note').value.trim();
  try{
    await WF.addDeposit(potId,{amount:amt,by_label:depBy,note,date});
    renderAll();closeSheet();toast('＋ '+rp(amt)+' masuk 🎉');
  }catch(e){ toast('Gagal: '+e.message); }
}

/* ---- Setoran cepat (FAB) ---- */
function quickDeposit(){
  if(!requireReady())return;
  if(currentView!=='saving'){switchView('saving');}
  if(!DB.pots.length){openPot();return;}
  if(DB.pots.length===1){openDeposit(DB.pots[0].id);return;}
  openSheet(`
    <h3>Setor ke Pos Mana?</h3>
    <div class="sub">Pilih pos tujuan setoran</div>
    ${DB.pots.map(p=>{
      const coll=p.deposits.reduce((s,d)=>s+d.amount,0);
      return `<button class="menu-item" style="width:100%;text-align:left" onclick="openDeposit('${p.id}')">
        <span class="mi">${p.ico||'💰'}</span>
        <div style="flex:1">${escapeHtml(p.name)}<small>${rp(coll)}${p.target?' / '+rp(p.target):''}</small></div>
        <span style="color:var(--purple);font-size:20px">＋</span>
      </button>`;
    }).join('')}
  `);
}

/* ---- Riwayat ---- */
function openHistory(potId){
  const p=DB.pots.find(x=>x.id===potId);
  const deps=[...p.deposits].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const coll=p.deposits.reduce((s,d)=>s+d.amount,0);
  openSheet(`
    <h3>Riwayat — ${escapeHtml(p.name)}</h3>
    <div class="sub">Total terkumpul: <b style="color:var(--emerald)">${rp(coll)}</b> · ${deps.length} setoran</div>
    <div class="hist">
      ${deps.length?deps.map(d=>{
        const mine = !d.created_by || d.created_by===DB.user?.id;
        return `
        <div class="hist-item">
          <div class="hist-l">
            <div class="a">${rp(d.amount)}<span class="hist-by">${escapeHtml(d.by_label||d.by||'Saya')}</span></div>
            <div class="m">${fmtDate(d.date)}${d.note?' · '+escapeHtml(d.note):''}</div>
          </div>
          ${mine
            ? `<button class="hist-del" onclick="delDeposit('${potId}','${d.id}')">Hapus</button>`
            : `<span class="hist-lock" title="Dicatat pasanganmu">🔒</span>`}
        </div>`;}).join(''):'<div class="empty">Belum ada setoran.</div>'}
    </div>
    <button class="btn ghost" style="margin-top:16px" onclick="openDeposit('${potId}')">＋ Setor Lagi</button>
  `);
}

// —— gambar bunga (vektor) ——
function rose(cx,cy,R,c1,c2,c3){
  let p='';
  for(let a=0;a<360;a+=72) p+=`<ellipse cx="${cx}" cy="${cy-R*0.55}" rx="${R*0.42}" ry="${R*0.62}" fill="${c1}" transform="rotate(${a} ${cx} ${cy})"/>`;
  for(let a=36;a<360;a+=72) p+=`<ellipse cx="${cx}" cy="${cy-R*0.36}" rx="${R*0.3}" ry="${R*0.44}" fill="${c2}" transform="rotate(${a} ${cx} ${cy})"/>`;
  p+=`<circle cx="${cx}" cy="${cy}" r="${R*0.34}" fill="${c3}"/>`;
  return p;
}
function leaf(cx,cy,len,w,ang,col){
  return `<g transform="translate(${cx} ${cy}) rotate(${ang})">
    <path d="M0 0 Q ${w} ${-len*0.5} 0 ${-len} Q ${-w} ${-len*0.5} 0 0 Z" fill="${col}"/>
    <path d="M0 -3 L0 ${-len+6}" stroke="rgba(255,255,255,.45)" stroke-width="2"/></g>`;
}
function floralCluster(){
  // koordinat di kotak ~0..320 (sudut kiri-atas)
  let g='';
  // daun dulu (di belakang)
  g+=leaf(150,150,120,34,25,'#9DBE96');
  g+=leaf(120,120,100,28,-40,'#8FB588');
  g+=leaf(230,120,92,26,60,'#A7C79F');
  g+=leaf(120,235,88,24,110,'#8FB588');
  g+=leaf(60,150,80,22,-15,'#A7C79F');
  // kuncup kecil
  g+=`<circle cx="255" cy="70" r="13" fill="#C9B6E4"/><circle cx="70" cy="255" r="12" fill="#D5C4EC"/>`;
  g+=`<circle cx="300" cy="150" r="9" fill="#E0D2F2"/><circle cx="150" cy="300" r="9" fill="#E0D2F2"/>`;
  // mawar
  g+=rose(95,95,70,'#9E7AC6','#B896D8','#F0E4FA');
  g+=rose(195,70,46,'#8B6DB6','#A98FCC','#EADFF6');
  g+=rose(70,195,42,'#B48FD0','#C9B6E4','#F4ECFB');
  return g;
}

function buildCardSVG(){
  const W=1080,H=1500;
  const pots=DB.pots.filter(p=> (shareSel ? shareSel.has(p.id) : true) && p.can_view_amount!==false);
  const totalColl=pots.reduce((s,p)=>s+p.deposits.reduce((a,d)=>a+d.amount,0),0);
  const totalTarget=pots.reduce((s,p)=>s+p.target,0);
  const pct=totalTarget>0?Math.min(totalColl/totalTarget*100,100):0;

  // kontribusi per orang
  const by={};
  pots.forEach(p=>(p.deposits||[]).forEach(d=>{const k=d.by_label||d.by||'Saya';by[k]=(by[k]||0)+d.amount;}));

  const today='Saat Ini';
  const fmt=n=>'Rp'+Math.round(n||0).toLocaleString('id-ID');

  // donut
  const dcx=540,dcy=520,dr=150,sw=42;
  const C=2*Math.PI*dr;
  const off=C*(1-pct/100);

  // pos (maks 3 biar muat rapi)
  const showPots=pots.slice(0,3);
  let potY=772;
  let potSVG='';
  showPots.forEach(p=>{
    const coll=p.deposits.reduce((a,d)=>a+d.amount,0);
    const pp=p.target>0?Math.min(coll/p.target*100,100):0;
    const barX=90,barW=900,barY=potY+48,barH=20;
    potSVG+=`
      <text x="90" y="${potY+18}" font-family="'Playfair Display',Georgia,serif" font-size="34" font-weight="700" fill="#3A2E5C">${escapeHtml(p.name)}</text>
      <text x="990" y="${potY+18}" text-anchor="end" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#6C4FA3">${fmt(coll)}</text>
      <rect x="${barX}" y="${barY}" width="${barW}" height="${barH}" rx="10" fill="#EADFF6"/>
      <rect x="${barX}" y="${barY}" width="${Math.max(barW*pp/100, pp>0?barH:0)}" height="${barH}" rx="10" fill="#8B6DB6"/>
      <text x="990" y="${barY+barH+30}" text-anchor="end" font-family="Georgia,serif" font-size="24" fill="#8A7CA8">${p.target>0?Math.round(pp)+'% dari '+fmt(p.target):fmt(coll)+' terkumpul'}</text>`;
    potY+=118;
  });

  // baris kontribusi
  let contribSVG='';
  const entries=Object.entries(by);
  if(entries.length){
    let cy=potY+14;
    contribSVG+=`<line x1="90" y1="${cy-30}" x2="990" y2="${cy-30}" stroke="#E7DBF4" stroke-width="2"/>`;
    entries.forEach(([k,v])=>{
      contribSVG+=`<text x="90" y="${cy+26}" font-family="Georgia,serif" font-size="30" fill="#5A4B7A">${escapeHtml(k)}</text>
      <text x="990" y="${cy+26}" text-anchor="end" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#3A2E5C">${fmt(v)}</text>`;
      cy+=46;
    });
    potY=cy;
  }

  const msg=escapeHtml(shareMsg||'');
  const fc=floralCluster();
  const msgY=Math.min(potY+82,H-84);

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#F6EFFA"/><stop offset="1" stop-color="#ECE1F7"/>
      </linearGradient>
      <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#6C4FA3"/><stop offset="1" stop-color="#A98FCC"/>
      </linearGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#bg)"/>
    <rect x="40" y="40" width="${W-80}" height="${H-80}" rx="40" fill="#FFFDFB"/>
    <rect x="62" y="62" width="${W-124}" height="${H-124}" rx="30" fill="none" stroke="#D9C8EE" stroke-width="2.5"/>

    <!-- bunga di 4 sudut -->
    <g opacity="0.96">
      <g transform="translate(26,26) scale(0.8)">${fc}</g>
      <g transform="translate(${W-26},26) scale(-0.8,0.8)">${fc}</g>
      <g transform="translate(26,${H-26}) scale(0.8,-0.8)">${fc}</g>
      <g transform="translate(${W-26},${H-26}) scale(-0.8,-0.8)">${fc}</g>
    </g>

    <!-- judul -->
    <text x="540" y="205" text-anchor="middle" font-family="Georgia,serif" font-size="40" fill="#8B6DB6">&#9825;</text>
    <text x="540" y="270" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="54" font-weight="800" letter-spacing="2" fill="#3A2E5C">WEDDING FUND</text>
    <text x="540" y="315" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#8A7CA8" font-style="italic">Progres Tabungan Kita &#8226; ${today}</text>

    <!-- donut -->
    <circle cx="${dcx}" cy="${dcy}" r="${dr}" fill="none" stroke="#EADFF6" stroke-width="${sw}"/>
    <circle cx="${dcx}" cy="${dcy}" r="${dr}" fill="none" stroke="url(#ring)" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 ${dcx} ${dcy})"/>
    <text x="${dcx}" y="${dcy-6}" text-anchor="middle" font-family="'Playfair Display',Georgia,serif" font-size="82" font-weight="800" fill="#6C4FA3">${Math.round(pct)}%</text>
    <text x="${dcx}" y="${dcy+44}" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#8A7CA8" letter-spacing="1">Terkumpul</text>
    <text x="${dcx}" y="${dcy+212}" text-anchor="middle" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#3A2E5C">${fmt(totalColl)}${totalTarget>0?' <tspan fill="#8A7CA8" font-weight="400">/ '+fmt(totalTarget)+'</tspan>':''}</text>

    ${potSVG}
    ${contribSVG}

    <!-- pesan -->
    ${msg?`<rect x="120" y="${msgY-44}" width="840" height="68" rx="20" fill="#FFFFFF" opacity="0.8"/>
    <text x="540" y="${msgY}" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="34" fill="#7A5EA8">${msg}</text>`:''}
  </svg>`;
}

async function genShare(){
  const ta=document.getElementById('share-msg');
  if(ta) shareMsg=ta.value;
  // ambil pos yang dipilih dari chip
  const chips=[...document.querySelectorAll('#share-pots .chip.active')];
  if(!chips.length){ toast('Pilih minimal 1 pos ya'); return; }
  shareSel=new Set(chips.map(c=>c.dataset.pid));
  const out=document.getElementById('share-out');
  const hint=document.getElementById('share-hint');
  out.innerHTML='<div style="text-align:center;color:var(--muted);padding:16px">Membuat kartu…</div>';

  try{
    const svg=buildCardSVG();
    const url='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
    const img=new Image();
    img.decoding='sync';
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});

    // render resolusi tinggi (nol blur)
    const scale=2;
    const cv=document.createElement('canvas');
    cv.width=1080*scale; cv.height=1500*scale;
    const ctx=cv.getContext('2d');
    ctx.setTransform(scale,0,0,scale,0,0);
    ctx.drawImage(img,0,0,1080,1500);

    const blob=await new Promise(r=>cv.toBlob(r,'image/png',1));
    const pngUrl=URL.createObjectURL(blob);
    lastShareBlob=blob;

    out.innerHTML=`<img src="${pngUrl}" class="share-preview" alt="kartu"/>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn" onclick="doShare()">📤 Bagikan</button>
        <button class="btn ghost" onclick="doSaveImg()">⬇️ Simpan</button>
      </div>`;
    hint.textContent='Pratinjau di atas = hasil aslinya (tajam). Tekan Bagikan buat kirim ke WhatsApp.';
  }catch(e){
    out.innerHTML='<div style="text-align:center;color:var(--danger);padding:16px">Gagal membuat kartu. Coba lagi ya.</div>';
  }
}

let lastShareBlob=null;
async function doShare(){
  if(!lastShareBlob) return;
  const file=new File([lastShareBlob],'wedding-fund.png',{type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],text:shareMsg}); }
    catch(e){}
  }else{
    doSaveImg();
    toast('HP ini belum dukung share langsung — gambar disimpan, kirim manual ya');
  }
}
function doSaveImg(){
  if(!lastShareBlob) return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(lastShareBlob);
  a.download='wedding-fund-'+new Date().toISOString().slice(0,10)+'.png';
  a.click();
  toast('Gambar tersimpan ⬇️');
}

/* Tunggu sampai library siap (maks ~8 detik), baru mulai. */
function tungguSiap(cb){
  let coba=0;
  (function cek(){
    const adaWF = !!window.WF;
    const adaSB = !!window.supabase;
    if(adaWF && adaSB) return cb();
    if(++coba > 40){          // 40 x 200ms = 8 detik
      if(!adaWF)      gateError('Gagal memuat aplikasi','File <b>db.js</b> tidak ditemukan.<br>Pastikan db.js ikut ter-upload ke hosting, sejajar dengan index.html.');
      else            gateError('Tidak ada koneksi','Gagal memuat pustaka Supabase.<br>Cek koneksi internetmu, lalu muat ulang.');
      return;
    }
    setTimeout(cek,200);
  })();
}

      if(!DB.user)            gateLogin();
      else if(!DB.household)  gateHousehold();
      else { hideGate(); renderAll(); }
    });
  }catch(e){
    console.error(e);
    gateError('Gagal memulai','Terjadi kesalahan saat menghubungkan ke server.<br><small>'+escapeHtml(e.message||'')+'</small>');
  }
});

/* Service worker — offline penuh (cache app + Chart.js + font) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
